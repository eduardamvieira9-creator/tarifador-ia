    <script>
        const chatWindow = document.getElementById('chat-window');
        const btnBanca = document.getElementById('btn-banca');
        let minutosSolicitados = 30; 
        let valorCalculadoGlobal = 0;

        function enviarComando() {
            const input = document.getElementById('campo-texto');
            const texto = input.value.toLowerCase().trim();
            if(!texto) return;

            exibirMensagem(input.value, 'user');
            input.value = '';

            // Extrai a quantidade de minutos digitados pelo operador
            const numerosEncontrados = texto.match(/\d+/);
            if (numerosEncontrados) {
                minutosSolicitados = parseInt(numerosEncontrados[0]);
            }

            // Definição das tarifas por minuto (Pico vs Normal)
            const tarifaPico = 0.50; 
            const tarifaNormal = 0.15; 

            // CAPTURA DO TEMPO REAL E HORÁRIO DO DISPOSITIVO
            const agora = new Date();
            const horaReal = agora.getHours();
            const minutoReal = agora.getMinutes().toString().padStart(2, '0');
            const diaSemana = agora.getDay(); // 0 = Domingo, 6 = Sábado

            // Regra de negócio: Horário de ponta é de segunda a sexta, das 18h às 21h.
            // Para garantir que você consiga demonstrar na apresentação hoje (domingo), 
            // o código vai considerar "Horário de Pico" se for após as 18h OU se for fim de semana (modo demo).
            const ehHorarioPico = (horaReal >= 18 && horaReal < 21) || (diaSemana === 0 || diaSemana === 6);

            // Cálculos matemáticos baseados nas tarifas industriais
            const valorPico = minutosSolicitados * tarifaPico;
            const valorDesconto = minutosSolicitados * tarifaNormal;

            setTimeout(() => {
                let respostaIA = `⚡ <strong>Análise de Demanda de Carga Concluída [Horário Real: ${horaReal}:${minutoReal}]:</strong>\n\n`;
                
                if (ehHorarioPico) {
                    respostaIA += `⚠️ ALERTA DE EFICIÊNCIA: O sistema detectou restrição de rede na concessionária local para este horário. A planta industrial encontra-se sob regime de <strong>Tarifa de Ponta (Sobrecarga)</strong>.\n\n`;
                    respostaIA += `📊 ANÁLISE DE CUSTO CONTEXTUAL:\n`;
                    respostaIA += `•🔴 <strong>Opção 1 (Despacho Imediato):</strong> R$ ${valorPico.toFixed(2)} (Tarifa de Pico - R$ ${tarifaPico.toFixed(2)}/min)\n`;
                    respostaIA += `•🟢 <strong>Opção 2 (Agendar pós-pico - 21h):</strong> R$ ${valorDesconto.toFixed(2)} (Tarifa Reduzida - R$ ${tarifaNormal.toFixed(2)}/min com 70% de economia).\n\n`;
                    respostaIA += `Como engenheira responsável pelo gerenciamento energético, qual diretriz de faturamento deseja adotar no CLP?`;
                } else {
                    respostaIA += `🟢 REGIME VERDE DETECTADO: A planta industrial opera fora do horário de ponta. Tarifa convencional liberada.\n\n`;
                    respostaIA += `📊 DETALHES DO FATURAMENTO:\n`;
                    respostaIA += `• Preço por minuto: R$ ${tarifaNormal.toFixed(2)}\n`;
                    respostaIA += `• Valor total para ${minutosSolicitados} minutos: <strong>R$ ${valorDesconto.toFixed(2)}</strong>\n\n`;
                    respostaIA += `Deseja emitir a ordem de pagamento imediata para ativação do relé?`;
                }

                exibirMensagem(respostaIA, 'assistant');

                // Cria dinamicamente os botões de escolha de acordo com a janela de tempo
                const containerBotoes = document.createElement('div');
                containerBotoes.className = 'container-botoes';
                containerBotoes.id = 'grupo-botoes-opcao';
                
                if (ehHorarioPico) {
                    containerBotoes.innerHTML = `
                        <button class="btn btn-opcoes" style="background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);" onclick="escolherOpcao('pico', ${valorPico})"><i class="fa-solid fa-bolt"></i> Despachar Agora</button>
                        <button class="btn btn-opcoes" style="background: linear-gradient(135deg, #10b981 0%, #065f46 100%);" onclick="escolherOpcao('agendar', ${valorDesconto})"><i class="fa-solid fa-clock"></i> Agendar Desconto</button>
                    `;
                } else {
                    containerBotoes.innerHTML = `
                        <button class="btn btn-opcoes" style="background: linear-gradient(135deg, #10b981 0%, #065f46 100%);" onclick="escolherOpcao('normal', ${valorDesconto})"><i class="fa-solid fa-circle-check"></i> Confirmar Faturamento</button>
                    `;
                }
                
                chatWindow.appendChild(containerBotoes);
                chatWindow.scrollTop = chatWindow.scrollHeight;

            }, 600);
        }

        function escolherOpcao(tipo, valor) {
            const botoes = document.getElementById('grupo-botoes-opcao');
            if(botoes) botoes.remove();

            valorCalculadoGlobal = valor;

            if (tipo === 'pico') {
                exibirMensagem(`Ordem emitida: Executar operação imediata assumindo custos de ponta.`, 'user');
                setTimeout(() => {
                    exibirMensagem(`Garantindo alocação de carga. Emitindo ordem de faturamento imediata via Mercado Pago no valor de R$ ${valor.toFixed(2)}.`, 'assistant');
                    exibirEstruturaPix(valor, "PICO");
                }, 800);
            } else if (tipo === 'agendar') {
                exibirMensagem(`Ordem emitida: Programar execução para janela pós-pico (21:00h).`, 'user');
                setTimeout(() => {
                    exibirMensagem(`Agendamento salvo na fila do supervisor. Emitindo faturamento programado com desconto de eficiência energética no valor de R$ ${valor.toFixed(2)}.`, 'assistant');
                    exibirEstruturaPix(valor, "AGENDADO_OTIMIZADO");
                }, 800);
            } else {
                exibirMensagem(`Ordem emitida: Validar faturamento em horário regular de operação.`, 'user');
                setTimeout(() => {
                    exibirMensagem(`Processando gateway. Gerando chave Pix dinâmica para ativação do circuito de campo no valor de R$ ${valor.toFixed(2)}.`, 'assistant');
                    exibirEstruturaPix(valor, "CONVENCIONAL");
                }, 800);
            }
        }

        function exibirMensagem(texto, autor) {
            const div = document.createElement('div');
            div.className = `msg ${autor}`;
            div.style.whiteSpace = 'pre-line'; 
            
            if(autor === 'assistant') {
                div.innerHTML = `<strong><i class="fa-solid fa-robot"></i> Inteligência IIoT:</strong><br><br>${texto}`;
            } else {
                div.innerHTML = `<strong><i class="fa-solid fa-user-gear"></i> Operador:</strong><br><br>${texto}`;
            }
            
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function exibirEstruturaPix(valor, sufixo) {
            const idFake = Math.floor(Math.random() * 9000) + 1000;
            const payload = `00020101021226830014br.gov.bcb.pix2561api.mercadopago.com/v1/pix/status/industrial${sufixo}${idFake}520400005303986540${valor.toFixed(2)}5802BR5925Tarifador_IIoT6006LORENA62070503***6304`;

            const div = document.createElement('div');
            div.className = 'pix-container';
            div.innerHTML = `
                <div class="sistema-status"><i class="fa-solid fa-qrcode"></i> GATEWAY MERCADO PAGO ATIVO</div>
                <span style="color:var(--accent-yellow); font-weight:700; font-size:13px;">String EMV (Copia e Cola) gerada para faturamento:</span>
                <textarea class="pix-code" readonly>${payload}</textarea>
                <button class="btn" style="background: var(--accent-yellow); color: #0f172a; margin-top: 10px; width:100%;" onclick="navigator.clipboard.writeText('${payload}'); alert('Código PIX copiado com sucesso!')"><i class="fa-solid fa-copy"></i> Copiar String de Pagamento</button>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            btnBanca.style.display = 'block'; 
        }

        function simularAprovacaoBanca() {
            btnBanca.style.display = 'none';
            
            const divStatus = document.createElement('div');
            divStatus.className = 'msg assistant';
            divStatus.style.borderLeftColor = 'var(--accent-green)';
            divStatus.innerHTML = `
                <strong style="color:var(--accent-green);"><i class="fa-solid fa-circle-check"></i> [NOTIFICAÇÃO INTERNA DE REDE]</strong><br><br>
                • STATUS: <strong>Pagamento Confirmado</strong> via Webhook.<br>
                • PROTOCOLO: MQTT Gateway ativo.<br>
                • DISPOSITIVO DE CAMPO: ESP32 (Lorena_Chão_Fábrica).<br>
                • AÇÃO: Pulso lógico enviado para a <strong>GPIO 13</strong>. Relé acoplado com sucesso. Contagem regressiva de ${minutosSolicitados} minutos iniciada no hardware.
            `;
            chatWindow.appendChild(divStatus);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
